<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="phoneBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1ECCA2" />
      <stop offset="50%" stop-color="#0DA17F" />
      <stop offset="100%" stop-color="#067056" />
    </linearGradient>
    <linearGradient id="glareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="islandShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="25" y="20" width="150" height="360" rx="18" />
    </clipPath>
  </defs>
  <rect x="25" y="20" width="150" height="360" rx="18" fill="url(#phoneBodyGrad)" stroke="#0DA17F" stroke-width="2" filter="url(#dropShadow)" />
  <rect x="176" y="110" width="3" height="35" rx="1.5" fill="#067056" />
  <rect x="176" y="155" width="3" height="18" rx="1.5" fill="#067056" />
  <g clip-path="url(#screenClip)">
    <path d="M25,300 L175,90 L175,20 L25,20 Z" fill="url(#glareGrad)" opacity="0.25"/>
    <line x1="10" y1="300" x2="180" y2="100" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" />
    <line x1="80" y1="20" x2="185" y2="280" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" />
  </g>
  <rect x="38" y="38" width="48" height="126" rx="24" fill="#15A886" stroke="#22D1A8" stroke-width="1.5" filter="url(#islandShadow)"/>
  <circle cx="62" cy="65" r="16" fill="#1A1A1A" stroke="#333333" stroke-width="2" />
  <circle cx="62" cy="65" r="7" fill="#050505" />
  <circle cx="58" cy="61" r="2.5" fill="#FFFFFF" opacity="0.7" />
  <circle cx="62" cy="105" r="16" fill="#1A1A1A" stroke="#333333" stroke-width="2" />
  <circle cx="62" cy="105" r="7" fill="#050505" />
  <circle cx="58" cy="101" r="2.5" fill="#FFFFFF" opacity="0.7" />
  <circle cx="62" cy="144" r="8" fill="#FFFBE6" stroke="#EAE2CA" stroke-width="1.5" />
  <circle cx="62" cy="144" r="3" fill="#FFFFFF" />
  <g transform="translate(52, 350) rotate(-90)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#034A38" letter-spacing="3">vivo</text>
  </g>
</svg>
