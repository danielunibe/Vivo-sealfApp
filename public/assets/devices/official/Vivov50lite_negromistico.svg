<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="baseMystic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#2B1D2F" />
    </linearGradient>
    <linearGradient id="cameraModule" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A2D3A" />
      <stop offset="100%" stop-color="#2E222E" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="moduleShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="20" y="20" width="160" height="360" rx="18" />
    </clipPath>
  </defs>
  <rect x="20" y="20" width="160" height="360" rx="18" fill="url(#baseMystic)" filter="url(#shadow)" stroke="#3E2E3E" stroke-width="1.5" />
  <rect x="18" y="100" width="2" height="20" rx="1" fill="#140F14" />
  <rect x="18" y="140" width="2" height="40" rx="1" fill="#140F14" />
  <g clip-path="url(#phoneClip)">
    <polygon points="20,20 100,20 100,120 20,200" fill="#ffffff" opacity="0.03" />
    <polygon points="100,20 180,20 180,200 100,120" fill="#000000" opacity="0.1" />
    <polygon points="20,200 100,120 180,200 100,300" fill="#a060f0" opacity="0.05" />
    <polygon points="20,200 100,300 100,380 20,380" fill="#000000" opacity="0.15" />
    <polygon points="180,200 180,380 100,380 100,300" fill="#ffffff" opacity="0.01" />
  </g>
  <rect x="28" y="30" width="54" height="160" rx="27" fill="url(#cameraModule)" stroke="#4A3A4A" stroke-width="1" filter="url(#moduleShadow)" />
  <circle cx="55" cy="62" r="20" fill="#0A1010" stroke="#4D3D4D" stroke-width="1.5" />
  <circle cx="55" cy="62" r="8" fill="#050A0A" />
  <circle cx="55" cy="62" r="2" fill="#296A85" />
  <circle cx="50" cy="57" r="3" fill="#ffffff" opacity="0.3" />
  <circle cx="55" cy="112" r="20" fill="#0A1010" stroke="#4D3D4D" stroke-width="1.5" />
  <circle cx="55" cy="112" r="8" fill="#050A0A" />
  <circle cx="55" cy="112" r="2" fill="#296A85" />
  <circle cx="50" cy="107" r="3" fill="#ffffff" opacity="0.3" />
  <circle cx="55" cy="162" r="15" fill="none" stroke="#D0D0D0" stroke-width="2.5" />
  <circle cx="55" cy="162" r="15" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.1" />
  <circle cx="90" cy="55" r="2.5" fill="#FCEFCE" />
  <circle cx="90" cy="67" r="2.5" fill="#FCEFCE" />
  <g transform="translate(45, 335) rotate(-90)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#7D6D7D" letter-spacing="3.5">vivo</text>
  </g>
</svg>
