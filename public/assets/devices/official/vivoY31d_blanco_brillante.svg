<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="glossyWhiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#F4F6F9" />
      <stop offset="100%" stop-color="#E2E7ED" />
    </linearGradient>
    <linearGradient id="moduleWhiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E8ECEF" />
    </linearGradient>
    <linearGradient id="glareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="moduleShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="25" y="20" width="150" height="360" rx="18" />
    </clipPath>
  </defs>
  <rect x="25" y="20" width="150" height="360" rx="18" fill="url(#glossyWhiteGrad)" filter="url(#shadow)" stroke="#CFD5DF" stroke-width="1.5" />
  <rect x="23" y="100" width="2" height="40" rx="1" fill="#C0C6D0" />
  <rect x="23" y="155" width="2" height="20" rx="1" fill="#C0C6D0" />
  <g clip-path="url(#phoneClip)">
    <path d="M-20,100 L180,-100 L180,120 L-20,320 Z" fill="url(#glareGrad)" />
  </g>
  <rect x="34" y="32" width="65" height="92" rx="20" fill="url(#moduleWhiteGrad)" stroke="#D4DBE4" stroke-width="1.5" filter="url(#moduleShadow)" />
  <circle cx="55" cy="55" r="16" fill="#0A0B0E" stroke="#C0C6CE" stroke-width="1.5" />
  <circle cx="55" cy="55" r="6" fill="#030405" />
  <circle cx="55" cy="55" r="1.5" fill="#296A85" />
  <circle cx="51" cy="51" r="2.5" fill="#ffffff" opacity="0.6" />
  <circle cx="55" cy="98" r="16" fill="#0A0B0E" stroke="#C0C6CE" stroke-width="1.5" />
  <circle cx="55" cy="98" r="6" fill="#030405" />
  <circle cx="55" cy="98" r="1.5" fill="#296A85" />
  <circle cx="51" cy="94" r="2.5" fill="#ffffff" opacity="0.6" />
  <circle cx="82" cy="55" r="3.5" fill="#FFFBE6" stroke="#B0B6C0" stroke-width="0.5" />
  <circle cx="82" cy="98" r="4.5" fill="none" stroke="#A3ABB5" stroke-width="1.8" />
  <g transform="translate(50, 340) rotate(-90)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#9CA3AF" letter-spacing="3.5">vivo</text>
  </g>
</svg>
