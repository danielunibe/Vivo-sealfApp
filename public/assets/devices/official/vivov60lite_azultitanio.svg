<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="iceBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5DBF8" />
      <stop offset="50%" stop-color="#9DB5D9" />
      <stop offset="100%" stop-color="#7B93B8" />
    </linearGradient>
    <linearGradient id="cameraModule" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DDEBFF" />
      <stop offset="100%" stop-color="#A9C2E6" />
    </linearGradient>
    <linearGradient id="glareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="moduleShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="20" y="20" width="160" height="360" rx="18" />
    </clipPath>
  </defs>
  <rect x="20" y="20" width="160" height="360" rx="18" fill="url(#iceBlueGrad)" filter="url(#shadow)" stroke="#A4BDDF" stroke-width="1.5" />
  <rect x="18" y="100" width="2" height="20" rx="1" fill="#7188B3" />
  <rect x="18" y="140" width="2" height="40" rx="1" fill="#7188B3" />
  <g clip-path="url(#phoneClip)">
    <path d="M -20,180 L 180, -20 L 180, 50 L -20, 250 Z" fill="url(#glareGrad)" />
  </g>
  <rect x="28" y="36" width="54" height="104" rx="27" fill="url(#cameraModule)" stroke="#E5F0FF" stroke-width="1.5" filter="url(#moduleShadow)" />
  <circle cx="55" cy="63" r="20" fill="#0A0F14" stroke="#9AB4D8" stroke-width="2" />
  <circle cx="55" cy="63" r="8" fill="#030608" />
  <circle cx="55" cy="63" r="2" fill="#296A85" />
  <circle cx="50" cy="58" r="3" fill="#ffffff" opacity="0.4" />
  <circle cx="55" cy="113" r="20" fill="#0A0F14" stroke="#9AB4D8" stroke-width="2" />
  <circle cx="55" cy="113" r="8" fill="#030608" />
  <circle cx="55" cy="113" r="2" fill="#296A85" />
  <circle cx="50" cy="108" r="3" fill="#ffffff" opacity="0.4" />
  <circle cx="95" cy="88" r="6" fill="none" stroke="#FFFFFF" stroke-width="2.2" />
  <circle cx="95" cy="88" r="6" fill="none" stroke="#FFFFFF" stroke-width="4.5" opacity="0.3" />
  <g transform="translate(45, 335) rotate(-90)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#E6EEFF" letter-spacing="3.5">vivo</text>
  </g>
</svg>
