<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="basePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D5C3F5" />
      <stop offset="100%" stop-color="#9C7AD8" />
    </linearGradient>
    <linearGradient id="cameraModule" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1D4FA" />
      <stop offset="100%" stop-color="#B69EE6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="moduleShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="20" y="20" width="160" height="360" rx="18" />
    </clipPath>
  </defs>
  <rect x="20" y="20" width="160" height="360" rx="18" fill="url(#basePurple)" filter="url(#shadow)" stroke="#C4ADED" stroke-width="1.5" />
  <rect x="18" y="100" width="2" height="20" rx="1" fill="#8E6AC2" />
  <rect x="18" y="140" width="2" height="40" rx="1" fill="#8E6AC2" />
  <g clip-path="url(#phoneClip)">
    <polygon points="20,20 100,20 100,120 20,200" fill="#ffffff" opacity="0.2" />
    <polygon points="100,20 180,20 180,200 100,120" fill="#000000" opacity="0.05" />
    <polygon points="20,200 100,120 180,200 100,300" fill="#ffffff" opacity="0.15" />
    <polygon points="20,200 100,300 100,380 20,380" fill="#000000" opacity="0.1" />
    <polygon points="180,200 180,380 100,380 100,300" fill="#ffffff" opacity="0.05" />
  </g>
  <rect x="28" y="30" width="54" height="160" rx="27" fill="url(#cameraModule)" stroke="#C4ADED" stroke-width="1" filter="url(#moduleShadow)" />
  <circle cx="55" cy="62" r="20" fill="#1A1A1A" stroke="#8E6AC2" stroke-width="1.5" />
  <circle cx="55" cy="62" r="8" fill="#050505" />
  <circle cx="55" cy="62" r="2" fill="#5E5C70" />
  <circle cx="50" cy="57" r="3" fill="#ffffff" opacity="0.4" />
  <circle cx="55" cy="112" r="20" fill="#1A1A1A" stroke="#8E6AC2" stroke-width="1.5" />
  <circle cx="55" cy="112" r="8" fill="#050505" />
  <circle cx="55" cy="112" r="2" fill="#5E5C70" />
  <circle cx="50" cy="107" r="3" fill="#ffffff" opacity="0.4" />
  <circle cx="55" cy="162" r="15" fill="none" stroke="#FFFFFF" stroke-width="2.5" />
  <circle cx="55" cy="162" r="15" fill="none" stroke="#FFFFFF" stroke-width="5" opacity="0.3" />
  <circle cx="90" cy="55" r="2.5" fill="#FFFBE6" />
  <circle cx="90" cy="67" r="2.5" fill="#FFFBE6" />
  <g transform="translate(45, 335) rotate(-90)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#7A57B0" letter-spacing="3.5">vivo</text>
  </g>
</svg>
