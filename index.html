<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0f12" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>VIVO Seller Hub</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background-color: transparent;
      }

      .native-boot {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0f12;
        color: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .native-boot-mark {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        border: 1px solid rgba(45, 212, 191, 0.35);
        background: rgba(45, 212, 191, 0.10);
        box-shadow: 0 0 30px rgba(45, 212, 191, 0.18);
      }
    </style>
  </head>
  <body>
    <div id="root"><div class="native-boot"><div class="native-boot-mark" aria-label="VIVO"></div></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
